apiVersion: batch/v1
kind: CronJob
metadata:
  name: weather-tracker
  namespace: default
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 10
  failedJobsHistoryLimit: 10
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: weather-tracker
              image: ghcr.io/zoehendershot/weather-pipeline:latest
              imagePullPolicy: Always
              env:
                - name: DYNAMODB_TABLE
                  value: "weather-tracking-v2"
                - name: S3_BUCKET
                  value: "acc-dp2"
                - name: AWS_REGION
                  value: "us-east-1"
                - name: CITY
                  value: "Charlottesville"
                - name: LATITUDE
                  value: "38.0293"
                - name: LONGITUDE
                  value: "-78.4767"
